services:
  postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: ke-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: deliverydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d deliverydb"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  backend:
    build: ./backend
    container_name: ke-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_USER: admin
      DB_PASSWORD: admin
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: deliverydb
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ke-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    container_name: ke-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
