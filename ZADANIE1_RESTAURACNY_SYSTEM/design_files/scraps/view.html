<!doctype html>
<html><head><meta charset="utf-8"><title>View PDF</title>
<style>body,html{margin:0;padding:0}canvas{display:block;margin:10px auto;border:1px solid #ccc}</style>
</head><body>
<div id="container"></div>
<script type="module">
import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.min.mjs';
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.7.76/build/pdf.worker.min.mjs';
(async () => {
  const pdf = await pdfjs.getDocument('../uploads/assigment.pdf').promise;
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const viewport = page.getViewport({ scale: 1.5 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    canvas.id = `p${i}`;
    document.getElementById('container').appendChild(canvas);
    await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
  }
  window.__done = true;
})();
</script>
</body></html>
