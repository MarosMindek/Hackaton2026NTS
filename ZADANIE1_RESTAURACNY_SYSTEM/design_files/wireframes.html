<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wireframes · FPT Restaurant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="tokens.css">
<style>
  body { background: #FAF7F1;}
  .wf-stage { min-height: 100vh; display:flex; flex-direction: column; padding-top: 60px;}
  .wf-topbar { position: fixed; top:0; left:0; right:0; z-index: 100; height: 56px; padding: 0 24px; display: flex; align-items:center; justify-content: space-between; background: rgba(250,247,241,.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--surface-line);}
  .wf-topbar a.back { text-decoration:none; color: var(--ink-2); font-size: 13px; padding: 8px 14px; border-radius: var(--r-pill); background: var(--surface-1); border:1px solid var(--surface-line);}
  .wf-topbar .title { font-family: var(--font-mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color: var(--ink-3);}
  .wf-topbar .legend { font-family:'Architects Daughter'; font-size: 14px; color: var(--ink-3);}

  /* Sketchy primitives */
  .wf {
    --bg: #FDFBF6;
    --ink: #1A1714;
    --accent: #F37021;
    --muted: #9F9486;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Architects Daughter', cursive;
    font-size: 13px;
    width: 100%; height: 100%;
    padding: 14px;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
  }
  .wf-mob { padding: 22px 14px 14px;}
  .wf-mob::before {
    content: ''; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    width: 64px; height: 6px; border-radius: 3px; background: var(--ink); opacity:.85;
  }
  .wf .row { display: flex; align-items: center; }
  .wf .col { display: flex; flex-direction: column; }
  .wf .stack { display: flex; flex-direction: column; gap: 8px;}
  .wf .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px;}
  .wf .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;}

  /* Boxes */
  .wf .b { border: 1.5px solid var(--ink); border-radius: 6px; background: var(--bg); padding: 6px 8px; }
  .wf .b.solid { background: var(--ink); color: var(--bg);}
  .wf .b.accent { background: var(--accent); color: #fff; border-color: var(--accent);}
  .wf .b.dashed { border-style: dashed;}
  .wf .b.placeholder { background: repeating-linear-gradient(45deg, rgba(0,0,0,.04) 0 6px, transparent 6px 12px); color: var(--muted);}
  .wf .b.tag { padding: 2px 6px; font-size: 10px; border-radius: 999px; display:inline-block; }
  .wf .h { display:flex; align-items:center; justify-content:space-between; margin-bottom: 8px;}
  .wf .h-title { font-weight: 700; font-size: 16px; letter-spacing:.5px;}

  /* Lines */
  .wf .line { height: 2px; background: var(--ink); width: 60%; border-radius: 1px;}
  .wf .line.short { width: 32%;}
  .wf .line.long { width: 88%;}
  .wf .line.thin { height: 1.5px; opacity:.6;}
  .wf .scribble { width: 100%; height: 2px;
    background-image: repeating-linear-gradient(135deg, transparent 0 2px, var(--ink) 2px 4px);
    border-radius: 1px;
  }
  .wf .scribbles { display:flex; flex-direction:column; gap: 6px; padding: 4px 0;}
  .wf .scribbles div { height: 7px; border-bottom: 1.5px solid var(--ink); width: 70%;}
  .wf .scribbles div:nth-child(2n) { width: 90%;}
  .wf .scribbles div:nth-child(3n) { width: 55%;}

  /* Annotation tags */
  .wf .ann { position: absolute; font-size: 11px; color: var(--accent); font-style: italic;}
  .wf .ann.tl { top: -22px; left: 0;}
  .wf .ann.tr { top: -22px; right: 0;}

  .wf .pill { padding: 4px 8px; border:1.5px solid var(--ink); border-radius: 999px; display:inline-block; font-size: 11px;}
  .wf .pill.solid { background: var(--ink); color: var(--bg);}
  .wf .pill.accent { background: var(--accent); color: #fff; border-color: var(--accent);}

  .wf .circle { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--ink); display:flex; align-items:center; justify-content:center;}
  .wf .circle.solid { background: var(--ink); color: var(--bg);}

  .wf .footer-tabs { display:flex; justify-content:space-around; padding-top: 8px; border-top: 1.5px solid var(--ink);}
  .wf .footer-tabs .tab { font-size: 10px; text-align:center;}
  .wf .footer-tabs .tab .ic { width: 24px; height: 24px; border:1.5px solid var(--ink); border-radius: 6px; margin: 0 auto 2px;}

  .wf .note { font-style: italic; color: var(--muted); font-size: 11px;}

  /* Section header outside artboards */
  h2.cv-section { font-family: var(--font-display); font-weight: 800; font-size: 28px; letter-spacing:-0.02em;}

  /* Tab control for wireframe directions */
  .dir-pick { display: inline-flex; gap: 4px; padding: 3px; background: rgba(0,0,0,.05); border-radius: 8px; margin-left: 12px;}
  .dir-pick .pp { padding: 4px 10px; border-radius: 5px; font-family: 'Architects Daughter'; font-size: 12px; color: var(--ink-3);}
  .dir-pick .pp.on { background: var(--ink-1); color: #fff;}
</style>
</head>
<body data-density="cozy">

<div class="wf-topbar">
  <a class="back" href="index.html">← Hub</a>
  <span class="title">02 · Wireframes · 3 directions per screen</span>
  <span class="legend">drag to pan · pinch / scroll to zoom · click to focus</span>
</div>

<div class="wf-stage">
  <div id="root"></div>
</div>

<script type="text/babel" src="design-canvas.jsx"></script>

</body>
</html>
